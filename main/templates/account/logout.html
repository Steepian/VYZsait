{% extends 'base.html' %}

{% block title %}Выход из аккаунта{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="mb-0">Выход из аккаунта</h3>
            </div>
            <div class="card-body text-center p-4">
                <p class="mb-4">Вы уверены, что хотите выйти?</p>
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger px-4">Выйти</button>
                        <a href="{% url 'index' %}" class="btn btn-secondary px-4">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
