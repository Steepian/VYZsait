<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Сайт отзывов о ВУЗах{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Навигационная панель (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">Отзывы о ВУЗах</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}">Главная</a>
                    </li>
                    <!-- Позже здесь будут ссылки на добавление вуза, вход и т.д. -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент страницы -->
    <main class="container my-4">
        {% block content %}
        <!-- Здесь будет уникальное содержимое каждой страницы -->
        {% endblock %}
    </main>

    <!-- Подвал (footer) -->
    <footer class="bg-light py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; {% now "Y" %} Отзывы о ВУЗах. Все права защищены.</p>
        </div>
    </footer>

    <!-- Подключаем Bootstrap JS (для работы навигационной панели и других компонентов) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Блок для дополнительных скриптов -->
    {% block extra_js %}{% endblock %}
</body>
</html>
